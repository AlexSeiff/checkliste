<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Opas Haushalt</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f4f4ef">

  <!-- iOS -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Opas Haushalt">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button id="back-btn" hidden aria-label="Zurück">‹</button>
    <h1 id="title">Opas Haushalt</h1>
    <button id="header-action" hidden></button>
  </header>

  <main id="main"></main>

  <footer id="footer" hidden>
    <input id="new-entry" type="text" placeholder="Neuer Eintrag…"
           autocomplete="off" enterkeyhint="done">
    <button id="add-btn" aria-label="Hinzufügen">+</button>
  </footer>

  <div id="toast" role="status"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
